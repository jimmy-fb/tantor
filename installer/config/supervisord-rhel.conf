[supervisord]
nodaemon=true
logfile=/var/log/tantor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/tantor

[program:tantor-backend]
command=python3.12 -m uvicorn app.main:app --host 127.0.0.1 --port 8000 --workers 2
directory=/opt/tantor/backend
environment=DATABASE_URL="sqlite:////var/lib/tantor/db/tantor.db",CORS_ORIGINS='["http://localhost","http://%(ENV_HOSTNAME)s"]'
autostart=true
autorestart=true
startretries=5
startsecs=5
stdout_logfile=/var/log/tantor/backend/stdout.log
stderr_logfile=/var/log/tantor/backend/stderr.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_backups=5

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
startretries=5
stdout_logfile=/var/log/tantor/nginx/stdout.log
stderr_logfile=/var/log/tantor/nginx/stderr.log
