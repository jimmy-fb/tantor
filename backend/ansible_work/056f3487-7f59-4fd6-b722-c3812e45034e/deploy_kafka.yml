---
- name: Prepare Kafka on all hosts
  hosts: all
  become: true
  tasks:
    - name: Create kafka group
      group:
        name: kafka
        system: true

    - name: Create kafka user
      user:
        name: kafka
        group: kafka
        system: true
        shell: /bin/false
        create_home: false

    - name: Create required directories
      file:
        path: "{{ item }}"
        state: directory
        owner: kafka
        group: kafka
        mode: "0755"
      loop:
        - "/var/lib/kafka/data"
        - "/var/log/kafka"
        - /opt

    - name: Copy Kafka binary from Tantor server
      copy:
        src: "/Users/jauneetsingh/tantor/backend/repo/kafka/kafka_2.13-3.9.1.tgz"
        dest: "/tmp/kafka_2.13-3.9.1.tgz"

    - name: Extract Kafka
      unarchive:
        src: "/tmp/kafka_2.13-3.9.1.tgz"
        dest: /opt/
        remote_src: true

    - name: Symlink Kafka home
      file:
        src: "/opt/kafka_2.13-3.9.1"
        dest: "/opt/kafka"
        state: link
        force: true

    - name: Set Kafka ownership
      file:
        path: "/opt/kafka/"
        owner: kafka
        group: kafka
        recurse: true

    - name: Clean up tarball
      file:
        path: "/tmp/kafka_2.13-3.9.1.tgz"
        state: absent


- name: Configure and start Kafka brokers
  hosts: brokers:broker_controllers
  become: true
  serial: 1
  tasks:
    - name: Upload broker configuration
      copy:
        src: "/Users/jauneetsingh/tantor/backend/ansible_work/056f3487-7f59-4fd6-b722-c3812e45034e/configs/{{ ansible_host }}_{{ node_id }}_server.properties"
        dest: "/opt/kafka/config/server.properties"
        owner: kafka
        group: kafka
        mode: "0644"

    - name: Upload systemd unit
      copy:
        src: "/Users/jauneetsingh/tantor/backend/ansible_work/056f3487-7f59-4fd6-b722-c3812e45034e/systemd/{{ ansible_host }}_{{ node_id }}_kafka.service"
        dest: /etc/systemd/system/kafka.service
        mode: "0644"

    - name: Reload systemd
      systemd:
        daemon_reload: true


    - name: Format KRaft storage
      command: >
        /opt/kafka/bin/kafka-storage.sh format
        -t HfZqL98LSHy8EKNvkEV5lg
        -c /opt/kafka/config/server.properties
        --ignore-formatted
      become_user: kafka


    - name: Enable and start Kafka
      systemd:
        name: kafka
        enabled: true
        state: started





- name: Configure and start ksqlDB
  hosts: ksqldbs
  become: true
  tasks:
    - name: Upload ksqlDB configuration
      copy:
        src: "/Users/jauneetsingh/tantor/backend/ansible_work/056f3487-7f59-4fd6-b722-c3812e45034e/configs/{{ ansible_host }}_{{ node_id }}_ksql-server.properties"
        dest: "/opt/kafka/config/ksql-server.properties"
        owner: kafka
        group: kafka
        mode: "0644"

    - name: Upload systemd unit
      copy:
        src: "/Users/jauneetsingh/tantor/backend/ansible_work/056f3487-7f59-4fd6-b722-c3812e45034e/systemd/{{ ansible_host }}_{{ node_id }}_ksqldb.service"
        dest: /etc/systemd/system/ksqldb.service
        mode: "0644"

    - name: Reload and start ksqlDB
      systemd:
        name: ksqldb
        daemon_reload: true
        enabled: true
        state: started



